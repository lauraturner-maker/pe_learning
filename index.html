<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Express Learning Widget</title>
    <style>
        :root {
            --primary-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --text-main: #202124;
            --text-secondary: #5f6368;
            --danger-red: #c5221f;
            --btn-red: #d2232a; /* Panda Express Red */
            --accent-red: #d2232a; 
            --border-color: #dadce0;
            --bg-hover: #f1f3f4;
            --badge-bg: rgba(32, 33, 36, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--primary-font);
            color: var(--text-main);
            background-color: #ffffff;
            padding: 20px;
        }

        /* --- Tabs --- */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .tab {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .tab:hover {
            color: var(--text-main);
        }

        .tab.active {
            color: var(--text-main);
            border-bottom: 2px solid var(--accent-red);
        }

        /* --- Header --- */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .header-actions h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .filter {
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* --- Grid & Cards --- */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .course-card {
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.2s;
            position: relative;
            padding-bottom: 12px;
        }

        .course-card:hover {
            background-color: var(--bg-hover);
        }

        .card-img-container {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
            position: relative;
            background-color: #f1f3f4; /* Fallback */
            border: 1px solid #eaeaea;
        }

        .badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background-color: var(--badge-bg);
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            z-index: 2;
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
            line-height: 1.3;
            padding: 0 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            padding: 0 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-status {
            font-size: 12px;
            font-weight: 500;
            padding: 0 4px;
        }

        .status-overdue { color: var(--danger-red); }
        .status-due { color: var(--text-secondary); }

        /* --- Modal (Course Details) --- */
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background-color: #fff;
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease-out;
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
        }

        .modal-hero {
            width: 100%;
            height: 180px;
            border-radius: 8px;
            background-color: #f1f3f4;
            margin-bottom: 20px;
            border: 1px solid #eaeaea;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .modal-meta {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin-bottom: 20px;
        }

        .about-heading {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .about-text {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .about-list {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 16px;
            padding-left: 20px;
        }

        .about-list li {
            margin-bottom: 6px;
        }

        .relevant-text {
            font-size: 14px;
            font-style: italic;
            color: var(--text-secondary);
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            background-color: #fff;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .start-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--btn-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .start-btn:hover {
            background-color: #b91d24;
        }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('your')" id="tabYour">Your Courses</div>
        <div class="tab" onclick="switchTab('recommended')" id="tabRecommended">Recommended</div>
    </div>

    <div class="header-actions">
        <h2 id="gridHeading">Your courses</h2>
        <div class="filter">Filter <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg></div>
    </div>

    <div class="course-grid" id="courseGrid">
        </div>

    <div class="modal-overlay" id="courseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Course Details</h3>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div id="modalHero" class="modal-hero"></div>
                <h2 class="modal-title" id="modalTitle">Title</h2>
                <div class="modal-meta" id="modalMeta">Meta info</div>
                <div class="divider"></div>
                <div class="about-heading">About the Course</div>
                <div class="about-text" id="modalDesc">Description</div>
                <ul class="about-list" id="modalList">
                    </ul>
                <div class="relevant-text" id="modalRelevant">Relevance</div>
            </div>
            <div class="modal-footer">
                <button class="start-btn" onclick="window.open('https://pservstaffbase.csod.com/', '_blank')">Start Course</button>
            </div>
        </div>
    </div>

    <script>
        // --- Image Library ---
        const img = {
            wok: "https://images.unsplash.com/photo-1552611052-33e04de081de?auto=format&fit=crop&q=80&w=800",
            chicken: "https://images.unsplash.com/photo-1585032226651-759b368d7246?auto=format&fit=crop&q=80&w=800",
            counter: "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&q=80&w=800", 
            steam: "https://images.unsplash.com/photo-1590311825124-73ec5233cb0a?auto=format&fit=crop&q=80&w=800", 
            safety: "https://images.unsplash.com/photo-1583337130417-3346a1be7dee?auto=format&fit=crop&q=80&w=800", 
            journey: "https://images.unsplash.com/photo-1528605248644-14dd04022da1?auto=format&fit=crop&q=80&w=800",
            inventory: "https://images.unsplash.com/photo-1586880244406-556ebe35f282?auto=format&fit=crop&q=80&w=800", 
            leadership: "https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&q=80&w=800", 
            culture: "https://images.unsplash.com/photo-1556761175-4b46a572b786?auto=format&fit=crop&q=80&w=800", 
            catering: "https://images.unsplash.com/photo-1555244162-803834f70033?auto=format&fit=crop&q=80&w=800"
        }

        // --- Data Arrays ---
        const yourCourses = [
            { id: 1, title: "Wok Station Safety", icon: "🔥", type: "Online", du: "2 hrs", statusText: "Overdue Feb 15, 2026", isOverdue: true, inProgress: true, img: img.wok, desc: "Essential safety protocols for operating and maintaining the wok station during peak hours.", bullets: ["Fire suppression systems and emergency shutoffs", "Proper oil temperature management", "Ergonomic lifting and tossing techniques", "End-of-shift cleaning procedures"], relevant: "Relevant for BOH Cooks." },
            { id: 2, title: "Orange Chicken Mastery", icon: "📹", type: "Video", du: "1 hr", statusText: "Overdue Feb 10, 2026", isOverdue: true, inProgress: false, img: img.chicken, desc: "The exact recipe and technique behind our signature Original Orange Chicken.", bullets: ["Batter consistency and frying times", "Creating the perfect sauce glaze", "Wok folding technique to coat without breaking", "Holding times for optimal crunch"], relevant: "Relevant for BOH Cooks." },
            { id: 3, title: "Advanced Guest Hospitality", icon: "🎧", type: "Online", du: "2 hrs", statusText: "Overdue Feb 28, 2026", isOverdue: true, inProgress: true, img: img.counter, desc: "Creating a welcoming environment and ensuring Guest Love in every interaction.", bullets: ["The Panda Express greeting standards", "Proper sampling procedures for new entrees", "Handling guest complaints gracefully"], relevant: "Relevant for FOH Staff." },
            { id: 4, title: "Steam Table Management", icon: "📍", type: "Event", du: "3 hrs", statusText: "Mar 05, 2026", isOverdue: false, inProgress: false, img: img.steam, desc: "Maintaining freshness, visual appeal, and quality standards on the steam table.", bullets: ["Proactive food ordering to BOH", "Temperature checks and logging", "Portion control techniques", "Stirring schedules to prevent drying"], relevant: "Relevant for FOH Shift Leads." },
            { id: 5, title: "Food Safety Compliance", icon: "📊", type: "Curriculum", du: "4 hrs", statusText: "Due in 8 days", isOverdue: false, inProgress: false, img: img.safety, desc: "Comprehensive food safety standards for a high-volume restaurant.", bullets: ["Cross-contamination prevention", "Proper chicken handling", "FIFO (First In, First Out) standards", "Date marking requirements"], relevant: "Relevant for all staff." },
            { id: 6, title: "The Panda Journey", icon: "🎧", type: "Online", du: "1 hr", statusText: "Overdue Mar 01, 2026", isOverdue: true, inProgress: false, img: img.journey, desc: "Introduction to Panda Express culture, values, and career growth opportunities.", bullets: ["Our mission and 'Panda Way'", "Founders' story", "Understanding your career path"], relevant: "Relevant for all new hires." }
        ];

        const recommendedCourses = [
            { id: 7, title: "BOH Inventory Best Practices", icon: "📋", type: "Online", du: "2 hrs", statusText: "Available", isOverdue: false, inProgress: false, img: img.inventory, desc: "Optimizing inventory management to reduce waste and ensure stock availability.", bullets: ["Effective ordering schedules", "Minimizing food waste", "Organizing the cooler and dry storage"], relevant: "Relevant for BOH Leads." },
            { id: 8, title: "Shift Leadership Fundamentals", icon: "📹", type: "Video", du: "1 hr", statusText: "Available", isOverdue: false, inProgress: false, img: img.leadership, desc: "Essential skills for transitioning into a leadership role within the store.", bullets: ["Effective communication with BOH and FOH", "Task delegation", "Managing peak-hour workflow"], relevant: "Recommended for potential Shift Leads." },
            { id: 9, title: "Guest Experience & Cultural Awareness", icon: "🎧", type: "Online", du: "2 hrs", statusText: "Available", isOverdue: false, inProgress: false, img: img.culture, desc: "Enhancing guest connections and understanding diverse guest needs.", bullets: ["Recognizing cultural nuances in service", "Active listening techniques", "Creating memorable guest moments"], relevant: "Recommended for all FOH staff." },
            { id: 10, title: "Catering Execution Standards", icon: "📍", type: "Event", du: "1 hr", statusText: "Available", isOverdue: false, inProgress: false, img: img.catering, desc: "The process for preparing, assembling, and delivering successful catering orders.", bullets: ["Large order packaging standards", "Confirming order accuracy", "Setting up on-site displays"], relevant: "Recommended for all staff." }
        ];

        let activeTab = 'your';
        let currentCourseList = yourCourses;

        // --- Functions ---

        function renderGrid() {
            const grid = document.getElementById('courseGrid');
            const heading = document.getElementById('gridHeading');
            grid.innerHTML = ''; 

            if (activeTab === 'your') {
                heading.textContent = 'Your courses';
                currentCourseList = yourCourses;
            } else {
                heading.textContent = 'Recommended for Development';
                currentCourseList = recommendedCourses;
            }

            currentCourseList.forEach(course => {
                const statusClass = course.isOverdue ? 'status-overdue' : 'status-due';
                const badgeHtml = course.inProgress ? `<div class="badge">In progress</div>` : '';
                
                const card = document.createElement('div');
                card.className = 'course-card';
                card.onclick = () => openModal(course.id);
                
                card.innerHTML = `
                    <div class="card-img-container" style="background: url('${course.img}') center/cover no-repeat;">
                        ${badgeHtml}
                    </div>
                    <div class="card-title">${course.title}</div>
                    <div class="card-meta">
                        ${course.icon} ${course.type} • ${course.du}
                    </div>
                    <div class="card-status ${statusClass}">${course.statusText}</div>
                `;
                
                grid.appendChild(card);
            });
        }

        function switchTab(tab) {
            if (activeTab === tab) return;

            activeTab = tab;

            document.getElementById('tabYour').classList.remove('active');
            document.getElementById('tabRecommended').classList.remove('active');

            if (activeTab === 'your') {
                document.getElementById('tabYour').classList.add('active');
            } else {
                document.getElementById('tabRecommended').classList.add('active');
            }

            renderGrid();
        }

        // Modal (Course Details) Logic
        const modal = document.getElementById('courseModal');

        function openModal(id) {
            const course = currentCourseList.find(c => c.id === id);
            if (!course) return;

            // Populate modal data using URL background
            document.getElementById('modalHero').style.background = `url('${course.img}') center/cover no-repeat`;
            document.getElementById('modalTitle').textContent = course.title;
            
            const statusClass = course.isOverdue ? 'status-overdue' : 'status-due';
            document.getElementById('modalMeta').innerHTML = `${course.icon} ${course.type} • ${course.du} • <span class="${statusClass}">${course.statusText}</span>`;
            
            document.getElementById('modalDesc').textContent = course.desc;
            document.getElementById('modalRelevant').textContent = course.relevant;

            const ul = document.getElementById('modalList');
            ul.innerHTML = ''; 
            course.bullets.forEach(bullet => {
                const li = document.createElement('li');
                li.textContent = bullet;
                ul.appendChild(li);
            });

            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10); 
        }

        function closeModal() {
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300); 
        }

        modal.addEventListener('click', (event) => {
            if (event.target === modal) {
                closeModal();
            }
        });

        // Initialize
        renderGrid();

    </script>
</body>
</html>
