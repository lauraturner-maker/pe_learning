<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Widget</title>
    <style>
        :root {
            --primary-font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --text-main: #202124;
            --text-secondary: #5f6368;
            --danger-red: #c5221f;
            --btn-red: #d2232a; /* Closer to Panda Express red */
            --border-color: #dadce0;
            --bg-hover: #f1f3f4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--primary-font);
            color: var(--text-main);
            background-color: #ffffff;
            padding: 20px;
        }

        /* --- Tabs --- */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .tab {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .tab.active {
            color: var(--text-main);
            border-bottom: 2px solid var(--text-main);
        }

        /* --- Header --- */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .header-actions h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .filter {
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* --- Grid & Cards --- */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .course-card {
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.2s;
            position: relative;
            padding-bottom: 12px;
        }

        .course-card:hover {
            background-color: var(--bg-hover);
        }

        .card-img-container {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
            position: relative;
            background-color: #e0e0e0;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background-color: rgba(32, 33, 36, 0.8);
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
            line-height: 1.3;
            padding: 0 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            padding: 0 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-status {
            font-size: 12px;
            font-weight: 500;
            padding: 0 4px;
        }

        .status-overdue { color: var(--danger-red); }
        .status-due { color: var(--text-secondary); }

        /* --- Modal --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #fff;
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
            position: relative;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
        }

        .modal-hero {
            width: 100%;
            height: 160px;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 20px;
            background-color: #e0e0e0;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .modal-meta {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin-bottom: 20px;
        }

        .about-heading {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .about-text {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .about-list {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 16px;
            padding-left: 20px;
        }

        .about-list li {
            margin-bottom: 6px;
        }

        .relevant-text {
            font-size: 14px;
            font-style: italic;
            color: var(--text-secondary);
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            background-color: #fff;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .start-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--btn-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .start-btn:hover {
            background-color: #b91d24;
        }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active">Your Courses</div>
        <div class="tab">Recommended</div>
    </div>

    <div class="header-actions">
        <h2>Your courses</h2>
        <div class="filter">Filter <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg></div>
    </div>

    <div class="course-grid" id="courseGrid">
        </div>

    <div class="modal-overlay" id="courseModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>Course Details</h3>
                <button class="close-btn" onclick="closeModal(null, true)">✕</button>
            </div>
            <div class="modal-body">
                <div id="modalHero" class="modal-hero"></div>
                <h2 class="modal-title" id="modalTitle">Title</h2>
                <div class="modal-meta" id="modalMeta">Meta info</div>
                <div class="divider"></div>
                <div class="about-heading">About the Course</div>
                <div class="about-text" id="modalDesc">Description</div>
                <ul class="about-list" id="modalList">
                    </ul>
                <div class="relevant-text" id="modalRelevant">Relevance</div>
            </div>
            <div class="modal-footer">
                <button class="start-btn">Start Course</button>
            </div>
        </div>
    </div>

    <script>
        // Store-specific content tailored for Panda Express
        const courses = [
            {
                id: 1,
                title: "Wok Safety & Maintenance",
                icon: "🎧",
                type: "Online",
                duration: "2 hrs",
                statusText: "Overdue Feb 15, 2026",
                isOverdue: true,
                inProgress: true,
                gradient: "linear-gradient(135deg, #f6d365 0%, #fda085 100%)",
                desc: "Essential safety protocols for operating and maintaining the wok station during peak hours.",
                bullets: [
                    "Fire suppression systems and emergency shutoffs",
                    "Proper oil temperature management",
                    "Ergonomic lifting and tossing techniques",
                    "End-of-shift cleaning procedures"
                ],
                relevant: "Relevant for Back of House (BOH) staff."
            },
            {
                id: 2,
                title: "Guest Love: The Front Counter",
                icon: "📹",
                type: "Video",
                duration: "1 hr",
                statusText: "Overdue Feb 10, 2026",
                isOverdue: true,
                inProgress: false,
                gradient: "linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%)",
                desc: "Creating a welcoming environment for every guest that walks through our doors.",
                bullets: [
                    "The Panda Express greeting standards",
                    "Proper sampling procedures for new entrees",
                    "Handling guest complaints gracefully",
                    "Upselling premium items (e.g., Honey Walnut Shrimp)"
                ],
                relevant: "Relevant for Front of House (FOH) staff."
            },
            {
                id: 3,
                title: "Drive-Thru Efficiency",
                icon: "🎧",
                type: "Online",
                duration: "2 hrs",
                statusText: "Overdue Feb 28, 2026",
                isOverdue: true,
                inProgress: true,
                gradient: "linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)",
                desc: "Mastering the headset and register to keep the drive-thru lane moving fast and accurately.",
                bullets: [
                    "Active listening and order confirmation",
                    "Managing wait times and parking guests",
                    "Packaging standards for large family meals"
                ],
                relevant: "Relevant for Drive-Thru Operators and FOH."
            },
            {
                id: 4,
                title: "Steam Table Management",
                icon: "📍",
                type: "Event",
                duration: "3 hrs",
                statusText: "Mar 05, 2026",
                isOverdue: false,
                inProgress: false,
                gradient: "linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%)",
                desc: "Keeping the steam table fresh, visually appealing, and properly stocked.",
                bullets: [
                    "Calling food orders to BOH proactively",
                    "Temperature checks and logging",
                    "Portion control for plates and bowls",
                    "Stirring techniques to maintain quality"
                ],
                relevant: "Relevant for all FOH shift leads."
            },
            {
                id: 5,
                title: "Food Safety & Handling",
                icon: "📊",
                type: "Curriculum",
                duration: "4 hrs",
                statusText: "Due in 8 days",
                isOverdue: false,
                inProgress: false,
                gradient: "linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)",
                desc: "Comprehensive guide to food safety compliance in a high-volume kitchen.",
                bullets: [
                    "Cross-contamination prevention",
                    "Proper raw chicken handling",
                    "Date marking and FIFO (First In, First Out)",
                    "Health inspector readiness"
                ],
                relevant: "Relevant for all staff members."
            },
            {
                id: 6,
                title: "Orange Chicken Preparation",
                icon: "🎧",
                type: "Online",
                duration: "1 hr 30 mins",
                statusText: "Overdue Mar 01, 2026",
                isOverdue: true,
                inProgress: true,
                gradient: "linear-gradient(135deg, #fccb90 0%, #d57eeb 100%)",
                desc: "The exact recipe and technique behind our signature Original Orange Chicken.",
                bullets: [
                    "Batter consistency and frying times",
                    "Creating the perfect sauce glaze",
                    "Wok folding technique to coat without breaking",
                    "Holding times for optimal crunch"
                ],
                relevant: "Relevant for BOH Cooks."
            }
        ];

        // Generate Grid
        const grid = document.getElementById('courseGrid');

        courses.forEach(course => {
            const statusClass = course.isOverdue ? 'status-overdue' : 'status-due';
            const badgeHtml = course.inProgress ? `<div class="badge">In progress</div>` : '';
            
            const card = document.createElement('div');
            card.className = 'course-card';
            card.onclick = () => openModal(course.id);
            
            card.innerHTML = `
                <div class="card-img-container" style="background: ${course.gradient};">
                    ${badgeHtml}
                </div>
                <div class="card-title">${course.title}</div>
                <div class="card-meta">
                    ${course.icon} ${course.type} • ${course.duration}
                </div>
                <div class="card-status ${statusClass}">${course.statusText}</div>
            `;
            
            grid.appendChild(card);
        });

        // Modal Logic
        const modal = document.getElementById('courseModal');

        function openModal(id) {
            const course = courses.find(c => c.id === id);
            if (!course) return;

            // Populate data
            document.getElementById('modalHero').style.background = course.gradient;
            document.getElementById('modalTitle').textContent = course.title;
            document.getElementById('modalMeta').innerHTML = `${course.icon} ${course.type} • ${course.duration} • <span class="${course.isOverdue ? 'status-overdue' : 'status-due'}">${course.statusText}</span>`;
            document.getElementById('modalDesc').textContent = course.desc;
            document.getElementById('modalRelevant').textContent = course.relevant;

            // Populate bullets
            const ul = document.getElementById('modalList');
            ul.innerHTML = '';
            course.bullets.forEach(bullet => {
                const li = document.createElement('li');
                li.textContent = bullet;
                ul.appendChild(li);
            });

            // Show modal
            modal.style.display = 'flex';
        }

        function closeModal(event, force = false) {
            if (force || event.target === modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
